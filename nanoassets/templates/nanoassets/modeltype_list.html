{% extends 'base.html' %}

{% block page_content %}

<h1>All Model / Type</h1>
<a href="{% url 'modeltype-new' %}">new</a>
{% if modeltype_list %}
  <ul>
    {% for modeltype in modeltype_list %}
      <li>
        <a href="{{ modeltype.get_absolute_url }}">{{ modeltype.name }} </a> (<a href="{% url 'modeltype-del' modeltype.id %}">Del</a>)
      </li>
    {% endfor %}
  </ul>
{% endif %}
{% endblock page_content %}
