{% extends 'base.html' %}

{% block page_content %}

<h3>Model / Type : {{ modeltype.manufacturer }} {{ modeltype.name }}</h3>
<a href="{% url 'modeltype-upd' modeltype.id %}">update</a>

<div>
  <h5>Instance List</h5>
  
  {% for instance in modeltype.instance_set.all %}
    <div>
      {{ instance.serial_number }} {{ instance.status }}
    </div>
  {% endfor %}
    
</div>

{% endblock page_content %}
