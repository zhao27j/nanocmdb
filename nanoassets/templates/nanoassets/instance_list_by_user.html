{% extends 'base.html' %}

{% block page_content %}

<h1>My IT Assets</h1>

{% if instance_list %}
    <table class="table table-striped table-hover">
      <tr>
        <th>Serial #</th>
        <th>Model / Type</th>
        <th>Status</th>
      </tr>
      {% for instance in instance_list %}
          <tr>
            <td>
              <input type="checkbox" name="instance" id="instance{{ forloop.counter }}" value="{{ instance.pk }}">
              <label for="instance{{ forloop.counter }}">{{ instance.serial_number }}</label>
            </td>
            <td><em>{{ instance.model_type }}</em></td>
            <td>{{ instance.status }}</td>
          </tr>
      {% endfor %}
    </table>
{% else %}
    <p>You don't have any IT assets !</p>
{% endif %}

{% endblock page_content %}
