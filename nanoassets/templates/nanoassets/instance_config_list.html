{% load auth_extras %}

<div class="accordion accordion-flush" id="accordionFlushConfigList">
  <div class="accordion-item">
    <h2 class="accordion-header">
      <button 
        class="accordion-button collapsed"
        type="button"
        data-bs-toggle="collapse"
        data-bs-target="#flush-collapseConfigList"
        aria-expanded="false"
        aria-controls="flush-collapseConfigList"
        style="height: 25px;"
      >
        Config List
      </button>
    </h2>
    <div id="flush-collapseConfigList" class="accordion-collapse collapse" data-bs-parent="#accordionFlushConfigList">
      <div class="accordion-body">
        <table class="table table-striped table-hover">
          <thead>
            <tr>
              <th>class</th>
              <th>parameter</th>
              <th>by</th>
              <th>on</th>
            </tr>
          </thead>
          <tbody>
            {% for config in configs %}
            <tr>
              <td>
                <button type="button" name="updateConfig" id="{{ config.pk }}" class="btn btn-link text-decoration-none" data-bs-toggle="modal" data-bs-target="#configCUDModal">
                  <small>{{ config.configClass }} {{ config.order }}</small>
                </button>
              </td>
              <td><small>{{ config.configPara }}</small></td>
              <!-- <td class="text-wrap" style="max-width: 576px"><small>{{ config.detail }}</small></td> -->
              <td><small>{{ config.by.get_full_name }}</small></td>
              <td><small>{{ config.on }}</small></td>
            </tr>
            {% endfor %}
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>
