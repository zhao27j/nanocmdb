{% load auth_extras %}

<div class="accordion accordion-flush" id="accordionFlushConfigList">
  <div class="accordion-item">
    <h2 class="accordion-header">
      <button 
        class="accordion-button collapsed"
        type="button"
        data-bs-toggle="collapse"
        data-bs-target="#flush-collapseConfigList"
        aria-expanded="false"
        aria-controls="flush-collapseConfigList"
        style="height: 25px;"
      >
        ...
      </button>
    </h2>
    <div id="flush-collapseConfigList" class="accordion-collapse collapse show" data-bs-parent="#accordionFlushConfigList">
      <div class="accordion-body">
        <table class="table table-striped table-hover">
          <thead>
            <tr>
              <th>class</th>
              <th>parameter</th>
              <th>by</th>
              <th>on</th>
            </tr>
          </thead>
          <tbody>
            {% for config in configs %}
            <tr>
              <td>
                <button type="button" name="updateConfig" id="{{ config.pk }}" class="btn btn-link text-decoration-none" data-bs-toggle="modal" data-bs-target="#configCUDModal">
                  <small>{{ config.configClass }} {{ config.order }}</small>
                </button>
              </td>
              <td><small>{{ config.configPara }}</small></td>
              <!-- <td class="text-wrap" style="max-width: 576px"><small>{{ config.detail }}</small></td> -->
              <td><small>{{ config.by.get_full_name }}</small></td>
              <td>
                <small>{{ config.on|date:"SHORT_DATE_FORMAT" }}</small>
                <button type="button" name="deleteConfig" id="{{ config.pk }}" class="btn btn-link text-decoration-none" data-bs-toggle="modal" data-bs-target="#configCUDModal">
                  <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-x" viewBox="0 0 16 16">
                    <path d="M4.646 4.646a.5.5 0 0 1 .708 0L8 7.293l2.646-2.647a.5.5 0 0 1 .708.708L8.707 8l2.647 2.646a.5.5 0 0 1-.708.708L8 8.707l-2.646 2.647a.5.5 0 0 1-.708-.708L7.293 8 4.646 5.354a.5.5 0 0 1 0-.708z"/>
                  </svg>
                </button>
              </td>
            </tr>
            {% endfor %}
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>
